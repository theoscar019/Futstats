<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutStats | Gestor de Plantilla</title>
    <meta name="description" content="Gestor avanzado de plantilla de equipo de fútbol. Administra jugadores, posiciones y estados.">
    <!-- Google Fonts para una tipografía moderna -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Encabezado de la aplicación -->
        <header class="app-header">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path><path d="M2 12h20"></path></svg>
                <h1>FutStats</h1>
            </div>
            <p>Gestor de Plantilla de Equipo</p>
        </header>

        <main class="dashboard">
            <!-- Sección Izquierda: Formulario de Registro -->
            <section class="panel form-section">
                <h2>Fichar Jugador</h2>
                <form id="playerForm" class="player-form" novalidate>
                    <div class="form-group">
                        <label for="playerName">Nombre del Jugador</label>
                        <input type="text" id="playerName" name="playerName" placeholder="Ej. Lionel Messi" required autocomplete="off">
                        <span class="error-msg" id="nameError"></span>
                    </div>

                    <div class="form-group">
                        <label for="playerPosition">Posición en el Campo</label>
                        <select id="playerPosition" name="playerPosition" required>
                            <option value="" disabled selected>Selecciona una posición</option>
                            <option value="Portero">Portero</option>
                            <option value="Defensa">Defensa</option>
                            <option value="Mediocampista">Mediocampista</option>
                            <option value="Delantero">Delantero</option>
                        </select>
                        <span class="error-msg" id="positionError"></span>
                    </div>

                    <div class="form-group">
                        <label for="playerNumber">Número de Dorsal (1-99)</label>
                        <input type="number" id="playerNumber" name="playerNumber" placeholder="10" min="1" max="99" required>
                        <span class="error-msg" id="numberError"></span>
                    </div>

                    <button type="submit" class="btn-submit">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        Añadir a la Plantilla
                    </button>
                </form>
            </section>

            <!-- Sección Derecha: Lista de Jugadores y Filtros -->
            <section class="panel list-section">
                <div class="list-header">
                    <h2>Plantilla Actual</h2>
                    <div class="stats">
                        <span id="totalPlayers" class="badge">Total: 0</span>
                    </div>
                </div>

                <!-- Controles de búsqueda y filtrado -->
                <div class="search-filter-container">
                    <div class="search-box form-group" style="margin-bottom: 0;">
                        <input type="text" id="searchInput" placeholder="Buscar jugador por nombre..." autocomplete="off">
                    </div>
                    <div class="filters">
                        <button class="filter-btn active" data-filter="Todos">Todos (0)</button>
                        <button class="filter-btn" data-filter="Portero">POR (0)</button>
                        <button class="filter-btn" data-filter="Defensa">DEF (0)</button>
                        <button class="filter-btn" data-filter="Mediocampista">MED (0)</button>
                        <button class="filter-btn" data-filter="Delantero">DEL (0)</button>
                    </div>
                </div>

                <!-- Contenedor dinámico donde se insertarán las tarjetas -->
                <div id="playersGrid" class="players-grid">
                    <!-- Los jugadores se renderizarán aquí vía JS -->
                </div>

                <!-- Estado de lista vacía -->
                <div id="emptyState" class="empty-state">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"></circle><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                    <p>No hay jugadores en la plantilla.</p>
                </div>
            </section>

            <!-- Sección Inferior: Formación del Equipo -->
            <section class="panel formation-section">
                <div class="list-header">
                    <h2>Formación del Equipo</h2>
                    <div class="form-group" style="margin-bottom: 0; min-width: 150px;">
                        <select id="formationSelect">
                            <option value="4-3-3">4-3-3</option>
                            <option value="4-4-2">4-4-2</option>
                            <option value="3-4-3">3-4-3</option>
                            <option value="5-3-2">5-3-2</option>
                        </select>
                    </div>
                </div>
                <div id="formationPitch" class="formation-pitch">
                    <!-- Los jugadores organizados por líneas se renderizarán aquí vía JS -->
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
